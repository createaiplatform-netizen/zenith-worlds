<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zenith OS</title>
  <style>
    body{
      margin:0;
      background:#05070a;
      color:#00ff88;
      font-family: monospace;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:420px;
      border:1px solid #00ff88;
      padding:20px;
      border-radius:10px;
      text-align:center;
    }

    .title{
      font-size:18px;
      margin-bottom:15px;
    }

    .big{
      font-size:22px;
      margin:15px 0;
    }

    .row{
      display:flex;
      justify-content:space-between;
      margin:8px 0;
    }

    button{
      margin-top:10px;
      width:100%;
      padding:10px;
      border:none;
      background:#00ff88;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="title">ZENITH OS</div>

  <div class="big" id="price">PRICE: --</div>
  <div class="big" id="signal">SIGNAL: --</div>

  <div class="row"><span>Mode</span><span id="mode">AUTO</span></div>

  <button onclick="toggleMode()">TOGGLE MODE</button>
</div>

<script>
let mode = "AUTO";

function toggleMode(){
  mode = mode === "AUTO" ? "MANUAL" : "AUTO";
  document.getElementById("mode").innerText = mode;
}

function tick(){
  const price = (Math.random()*1.2+0.4);

  let signal = "HOLD";

  if(mode === "AUTO"){
    if(price > 1.2) signal = "BUY";
    else if(price < 0.8) signal = "SELL";
  } else {
    signal = "MANUAL";
  }

  document.getElementById("price").innerText = "PRICE: " + price.toFixed(4);
  document.getElementById("signal").innerText = "SIGNAL: " + signal;
}

setInterval(tick, 700);
tick();
</script>

</body>
</html>
