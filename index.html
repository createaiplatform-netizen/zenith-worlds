<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zenith OS v3</title>
  <style>
    body{
      margin:0;
      background:#05070a;
      color:#00ff88;
      font-family: monospace;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:500px;
      border:1px solid #00ff88;
      padding:20px;
      border-radius:10px;
    }

    .title{
      text-align:center;
      font-size:18px;
      margin-bottom:10px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      margin:5px 0;
    }

    .big{
      font-size:22px;
      text-align:center;
      margin:10px 0;
    }

    .history{
      height:120px;
      overflow:auto;
      border:1px solid #00ff88;
      padding:10px;
      margin-top:10px;
      font-size:12px;
    }

    select, button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      background:#00ff88;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="title">ZENITH OS v3</div>

  <select id="asset" onchange="changeAsset()">
    <option value="XRP">XRP</option>
    <option value="BTC">BTC</option>
    <option value="ETH">ETH</option>
  </select>

  <div class="big" id="price">PRICE: --</div>
  <div class="big" id="signal">SIGNAL: --</div>

  <div class="row"><span>Asset</span><span id="currentAsset">XRP</span></div>

  <button onclick="toggleMode()">TOGGLE MODE</button>

  <div class="history" id="history"></div>
</div>

<script>
let mode = "AUTO";
let asset = "XRP";
let history = [];

function changeAsset(){
  asset = document.getElementById("asset").value;
  history = [];
}

function toggleMode(){
  mode = mode === "AUTO" ? "MANUAL" : "AUTO";
}

function tick(){
  const base = asset === "BTC" ? 30000 :
               asset === "ETH" ? 2000 : 1;

  const price = base + (Math.random() * base * 0.02);

  let signal = "HOLD";

  if(mode === "AUTO"){
    if(price > base * 1.01) signal = "BUY";
    else if(price < base * 0.99) signal = "SELL";
  } else {
    signal = "MANUAL";
  }

  const entry = `${asset} P:${price.toFixed(2)} | S:${signal}`;
  history.push(entry);

  if(history.length > 20) history.shift();

  document.getElementById("price").innerText = "PRICE: " + price.toFixed(2);
  document.getElementById("signal").innerText = "SIGNAL: " + signal;
  document.getElementById("currentAsset").innerText = asset;
  document.getElementById("history").innerHTML = history.join("<br>");
}

setInterval(tick, 700);
tick();
</script>

</body>
</html>
