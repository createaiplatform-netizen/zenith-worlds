<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zenith OS v2</title>
  <style>
    body{
      margin:0;
      background:#05070a;
      color:#00ff88;
      font-family: monospace;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:450px;
      border:1px solid #00ff88;
      padding:20px;
      border-radius:10px;
    }

    .title{
      text-align:center;
      font-size:18px;
      margin-bottom:10px;
    }

    .big{
      font-size:22px;
      text-align:center;
      margin:10px 0;
    }

    .history{
      height:120px;
      overflow:auto;
      border:1px solid #00ff88;
      padding:10px;
      margin-top:10px;
      font-size:12px;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      background:#00ff88;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="title">ZENITH OS v2</div>

  <div class="big" id="price">PRICE: --</div>
  <div class="big" id="signal">SIGNAL: --</div>

  <button onclick="toggleMode()">TOGGLE MODE</button>

  <div class="history" id="history"></div>
</div>

<script>
let mode = "AUTO";
let history = [];

function toggleMode(){
  mode = mode === "AUTO" ? "MANUAL" : "AUTO";
}

function tick(){
  const price = (Math.random()*1.2+0.4);
  let signal = "HOLD";

  if(mode === "AUTO"){
    if(price > 1.2) signal = "BUY";
    else if(price < 0.8) signal = "SELL";
  } else {
    signal = "MANUAL";
  }

  const entry = `P:${price.toFixed(4)} | S:${signal}`;
  history.push(entry);

  if(history.length > 20) history.shift();

  document.getElementById("price").innerText = "PRICE: " + price.toFixed(4);
  document.getElementById("signal").innerText = "SIGNAL: " + signal;
  document.getElementById("history").innerHTML = history.join("<br>");
}

setInterval(tick, 700);
tick();
</script>

</body>
</html>
