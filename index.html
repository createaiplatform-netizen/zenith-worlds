<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zenith OS v6</title>
  <style>
    body{
      margin:0;
      background:#05070a;
      color:#00ff88;
      font-family: monospace;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:600px;
      border:1px solid #00ff88;
      padding:20px;
      border-radius:10px;
    }

    .title{
      text-align:center;
      font-size:18px;
      margin-bottom:10px;
    }

    .big{
      font-size:22px;
      text-align:center;
      margin:10px 0;
    }

    .row{
      display:flex;
      justify-content:space-between;
      margin:5px 0;
    }

    canvas{
      width:100%;
      height:150px;
      border:1px solid #00ff88;
      margin-top:10px;
    }

    select, button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      background:#00ff88;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="title">ZENITH OS v6 (CHART ENGINE)</div>

  <select id="asset" onchange="changeAsset()">
    <option value="XRP">XRP</option>
    <option value="BTC">BTC</option>
    <option value="ETH">ETH</option>
  </select>

  <div class="big" id="price">PRICE: --</div>
  <div class="big" id="signal">SIGNAL: --</div>

  <div class="row"><span>Asset</span><span id="currentAsset">XRP</span></div>

  <button onclick="toggleMode()">TOGGLE MODE</button>

  <canvas id="chart"></canvas>
</div>

<script>
let mode = "AUTO";
let asset = "XRP";
let prices = [];

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = canvas.offsetWidth;
  canvas.height = 150;
}
resize();

window.onresize = resize;

function changeAsset(){
  asset = document.getElementById("asset").value;
  prices = [];
}

function toggleMode(){
  mode = mode === "AUTO" ? "MANUAL" : "AUTO";
}

function drawChart(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.strokeStyle = "#00ff88";

  for(let i=0;i<prices.length;i++){
    let x = (i / prices.length) * canvas.width;
    let y = canvas.height - (prices[i] / 2);

    if(i === 0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }

  ctx.stroke();
}

function tick(){
  const base = asset === "BTC" ? 30000 :
               asset === "ETH" ? 2000 : 1;

  const change = (Math.random() - 0.5) * 0.03;
  const price = base * (1 + change);

  prices.push(price);
  if(prices.length > 50) prices.shift();

  let signal = "HOLD";
  if(mode === "AUTO"){
    if(change > 0.015) signal = "BUY";
    else if(change < -0.015) signal = "SELL";
  } else {
    signal = "MANUAL";
  }

  document.getElementById("price").innerText = "PRICE: " + price.toFixed(2);
  document.getElementById("signal").innerText = "SIGNAL: " + signal;
  document.getElementById("currentAsset").innerText = asset;

  drawChart();
}

setInterval(tick, 700);
tick();
</script>

</body>
</html>
