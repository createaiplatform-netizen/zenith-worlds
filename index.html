<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zenith OS v5</title>
  <style>
    body{
      margin:0;
      background:#05070a;
      color:#00ff88;
      font-family: monospace;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:560px;
      border:1px solid #00ff88;
      padding:20px;
      border-radius:10px;
    }

    .title{
      text-align:center;
      font-size:18px;
      margin-bottom:10px;
    }

    .big{
      font-size:22px;
      text-align:center;
      margin:10px 0;
    }

    .row{
      display:flex;
      justify-content:space-between;
      margin:5px 0;
    }

    .history{
      height:150px;
      overflow:auto;
      border:1px solid #00ff88;
      padding:10px;
      margin-top:10px;
      font-size:12px;
    }

    select, button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      background:#00ff88;
      color:#000;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="title">ZENITH OS v5 (RISK ENGINE)</div>

  <select id="asset" onchange="changeAsset()">
    <option value="XRP">XRP</option>
    <option value="BTC">BTC</option>
    <option value="ETH">ETH</option>
  </select>

  <div class="big" id="price">PRICE: --</div>
  <div class="big" id="signal">SIGNAL: --</div>

  <div class="row"><span>Asset</span><span id="currentAsset">XRP</span></div>
  <div class="row"><span>Risk</span><span id="risk">LOW</span></div>

  <button onclick="toggleMode()">TOGGLE MODE</button>
  <button onclick="clearHistory()">RESET MEMORY</button>

  <div class="history" id="history"></div>
</div>

<script>
let mode = "AUTO";
let asset = "XRP";
let history = JSON.parse(localStorage.getItem("zenith_history") || "[]");

function save(){
  localStorage.setItem("zenith_history", JSON.stringify(history));
}

function changeAsset(){
  asset = document.getElementById("asset").value;
}

function toggleMode(){
  mode = mode === "AUTO" ? "MANUAL" : "AUTO";
}

function clearHistory(){
  history = [];
  save();
}

function calcRisk(volatility){
  if(volatility > 0.02) return "HIGH";
  if(volatility > 0.01) return "MEDIUM";
  return "LOW";
}

function tick(){
  const base = asset === "BTC" ? 30000 :
               asset === "ETH" ? 2000 : 1;

  const change = (Math.random() - 0.5) * 0.03;
  const price = base * (1 + change);

  const risk = calcRisk(Math.abs(change));

  let signal = "HOLD";

  if(mode === "AUTO"){
    if(change > 0.015) signal = "BUY";
    else if(change < -0.015) signal = "SELL";
  } else {
    signal = "MANUAL";
  }

  const entry = `${asset} | ${price.toFixed(2)} | ${signal} | ${risk}`;
  history.push(entry);

  if(history.length > 35) history.shift();

  save();

  document.getElementById("price").innerText = "PRICE: " + price.toFixed(2);
  document.getElementById("signal").innerText = "SIGNAL: " + signal;
  document.getElementById("risk").innerText = risk;
  document.getElementById("currentAsset").innerText = asset;

  document.getElementById("history").innerHTML = history.join("<br>");
}

setInterval(tick, 800);
tick();
</script>

</body>
</html>
