<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zenith Running</title>
</head>
<body>

<h2>ZENITH IS RUNNING</h2>
<div id="out"></div>

<script>
setInterval(() => {
  const price = (Math.random() * 1.2 + 0.4).toFixed(4);

  let signal = "HOLD";
  if (price > 1.2) signal = "BUY";
  if (price < 0.8) signal = "SELL";

  document.getElementById("out").innerHTML =
    "PRICE: " + price + "<br>SIGNAL: " + signal;
}, 500);
</script>

</body>
</html>
